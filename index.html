<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>目录</title>
  <meta name="description" content="相关文献目录，展示标题、作者、作者单位、期刊名称与摘要，并可直接进入每篇 HTML 阅读。">
  <style>
    :root {
      --bg-a: #f6f1e7;
      --bg-b: #f8dcb8;
      --ink: #0f172a;
      --muted: #334155;
      --accent: #cd5c08;
      --card: rgba(255, 255, 255, 0.74);
      --line: rgba(148, 163, 184, 0.34);
      --soft-shadow: 0 18px 40px rgba(15, 23, 42, 0.15);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: "Times New Roman", "Noto Serif SC", "PingFang SC", "Microsoft YaHei", serif;
      background:
        radial-gradient(1200px 620px at -10% -10%, rgba(255, 255, 255, 0.72), transparent 55%),
        radial-gradient(900px 500px at 110% 10%, rgba(255, 182, 118, 0.34), transparent 55%),
        linear-gradient(140deg, var(--bg-a), var(--bg-b));
    }

    .bg-decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(148, 163, 184, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.08) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(circle at 50% 50%, black 20%, transparent 72%);
      z-index: 0;
    }

    .index-page {
      position: relative;
      padding: 24px;
    }

    .hero,
    .toolbar,
    .card-grid {
      position: relative;
      z-index: 1;
      width: min(1160px, 100%);
      margin-inline: auto;
    }

    .hero {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: var(--radius-xl);
      box-shadow: var(--soft-shadow);
      padding: 28px 28px 22px;
      animation: rise 0.66s ease both;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .hero h1 {
      margin: 10px 0 8px;
      font-family: "Times New Roman", "Noto Serif SC", "Songti SC", serif;
      font-size: clamp(1.85rem, 3.2vw, 3rem);
      line-height: 1.2;
    }

    .hero-sub {
      margin: 0;
      max-width: 74ch;
      color: var(--muted);
      line-height: 1.65;
    }

    .stats {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .stats span {
      border: 1px solid rgba(205, 92, 8, 0.28);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.92rem;
      background: rgba(255, 255, 255, 0.7);
    }

    .toolbar {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr minmax(220px, 380px);
      gap: 12px;
      align-items: end;
    }

    .filter-stack {
      display: grid;
      gap: 10px;
    }

    .filter-title {
      margin: 0 0 2px;
      color: #475569;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: #1e293b;
      padding: 10px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .filter-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }

    .filter-btn.active {
      border-color: rgba(205, 92, 8, 0.5);
      color: #7c2d12;
    }

    .search-wrap {
      display: grid;
      gap: 6px;
      color: #475569;
      font-weight: 600;
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.45);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.78);
      padding: 11px 12px;
      font: inherit;
    }

    .card-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .paper-card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: var(--radius-lg);
      box-shadow: var(--soft-shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: rise 0.55s ease both;
    }

    .paper-card h2 {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.38;
    }

    .paper-card h2 a {
      color: #7c2d12;
      text-decoration: none;
    }

    .paper-card h2 a:hover {
      text-decoration: underline;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
    }

    .card-badge {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.34);
    }

    .meta-row {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .abstract-preview {
      border: 1px dashed var(--line);
      border-radius: var(--radius-md);
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.6);
    }

    .abstract-preview summary {
      cursor: pointer;
      font-weight: 700;
      color: #7c2d12;
    }

    .abstract-preview p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.58;
    }

    .read-link {
      margin-top: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: #7c2d12;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: 10px 12px;
    }

    .read-link:hover {
      background: #9a3412;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 28px 14px;
      border-radius: var(--radius-lg);
      background: var(--card);
      border: 1px dashed var(--line);
    }

    .empty-state h2 {
      margin: 0;
    }

    .empty-state p {
      margin: 6px 0 0;
      color: #475569;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1024px) {
      .card-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .index-page {
        padding: 14px;
      }
      .hero {
        padding: 18px 14px 16px;
      }
      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="index-page">
  <div class="bg-decor"></div>

  <header class="hero">
    <p class="eyebrow">GitHub Pages · Static Archive</p>
    <h1>文献目录</h1>
    <p class="hero-sub">目录自动链接 <code>content</code> 中全部 HTML，并展示每篇文章的标题、作者、作者单位、期刊名称与摘要，可直接进入全文阅读。</p>
    <div class="stats">
      <span>总计 <strong id="statTotal">0</strong></span>
      <span>当前显示 <strong id="statVisible">0</strong></span>
    </div>
  </header>

  <section class="toolbar">
    <div class="filter-stack">
      <div>
        <p class="filter-title">文献分类</p>
        <div class="filter-buttons" id="langFilters"></div>
      </div>
      <div>
        <p class="filter-title">年份筛选</p>
        <div class="filter-buttons" id="yearFilters"></div>
      </div>
    </div>
    <label class="search-wrap" for="searchInput">
      <span>检索</span>
      <input id="searchInput" type="search" placeholder="按标题、作者、单位、期刊或摘要搜索">
    </label>
  </section>

  <main class="card-grid" id="paperGrid"></main>

  <template id="emptyStateTemplate">
    <section class="empty-state">
      <h2>没有匹配结果</h2>
      <p>请尝试更换关键词或切换年份筛选。</p>
    </section>
  </template>

  <script id="paperData" type="application/json">[{"title": "传统家国同构治国理念的阐析及对当今三治融合的借鉴意义", "authors": "于语和和穆亨", "year": "2023", "language": "CN", "affiliation": "于语和，南开大学法学院教授，博士生导师；穆亨南开大学法学院法律史专业博士研究生（天津，300071）", "journal": "Journal of Ethnic Culture", "abstract": "小农经济和伦理政治文化共同塑造的家国同构不仅指古代中国的社会形态，也是理想状态下的治国之道。自孔子起，先秦儒家一直致力于梳理家与国的关系，孟子对舜孝子圣王形象的塑造从侧面反映了他继承了孔子的家本位家国同构理念。家国同构治国理念最终经荀子改造，完成了国本位的构建，并为后世的大一统王朝所沿用。家国同构有其功用，它给予了古代基层自治的动力、梳理了古代法 法治中情理法的关系、为统治者提供了政权合理合法性的道德基础。虽然家国同构律作为一种治国理念在二十世纪初被摒弃，但作为古人治理智慧的结晶，依然可以为人当前乡村基层治理提供广泛的思路与启示。它提供了用新型乡约助力自治、将村类规民约纳入乡村治理的规则中以及将社会主义核心价值注入家风德治教化这三种学思路。而这三者可以有效地促进农村基层的自治、法治和德治建设，促进“三治融", "link": "content/CN/于语和和穆亨 - 2023 - 传统家国同构治国理念的阐析及对当今三治融合的借鉴意义.html"}, {"title": "村规民约在乡风文明建设中的作用分析", "authors": "刘晓航", "year": "2023", "language": "CN", "affiliation": "文/刘晓航（西安交通工程学院，讲师）的监督，确保专项资金得到规范管理和使用，从而推动乡村振兴战略的全面实施。乡村振兴战略的实施离不开对乡村振兴专项资金的内部控制及有效管理，只有强化专项资金内部控制及有效控制，让专项资金用在正确的地方，才能使专项资金更具针对性，同时也能充分发挥财政资金的价值引导作用，从而满足乡村振兴战略实施的需要。同时，各地要加强专项资金监管力度，确保专项资金的流向正确，坚决维护人民财产安全和“财”尽其用", "journal": "未自动识别", "abstract": "未自动识别", "link": "content/CN/刘晓航 - 2023 - 村规民约在乡风文明建设中的作用分析.html"}, {"title": "“村规-村建-村管”联动的乡村建设路径探索——以浙江省余村乡村共同缔造实验为例", "authors": "刘迪", "year": "2024", "language": "CN", "affiliation": "刘迪(1983-)，男，中国城市规划设计研究院上海分院首席设计师，高级城市规划师，Lau_seu@sina. com", "journal": "EP. 2024 城市规划 CITY PLANNING REVIEW 1.2 乡村建设的制度我国的乡村建设制度在体系上仿照城市建设框架，其治理逻辑按照村庄规划、村庄建设和村庄运营维护管理三个环节容纳了乡村建设的所有内容", "abstract": "历史上长期的城乡二元制度，使得城与 乡在土地使用和行政运行机制等方面存在巨大差异，使得我国在城镇建设中取得的巨大成功与经验难以复制到乡村建设领域。掺杂有城市规划思维烙印的村庄规划长期存在不实用、不适用，以及与村庄建设、村庄运营维护管理脱节的问题。通过对比乡村建设与城市建设的模式差异，以共同缔造理念为依托，在学界已有实践认知的基础上，提出围绕事权主体的“实用性”村庄规划、基于村民主体需求的“内生型”乡村建设行动和面向多元主体参与的“自治型”村规民约。按照“村规、村建、村管”的共同缔造路径，提出乡村建设的全过程治理策略，并以浙江省余村村庄规划为实验案例，对全过程治理策略进行了实证分析", "link": "content/CN/刘迪 - 2024 - “村规-村建-村管”联动的乡村建设路径探索——以浙江省余村乡村共同缔造实验为例.html"}, {"title": "村规民约对农村养老福利的作用机制分析——基于浙江省衢州市28个村的观察", "authors": "卢瑶玥 等", "year": "2023", "language": "CN", "affiliation": "未自动识别", "journal": "未自动识别", "abstract": "村规民约作为典型的乡村治理非正式制度发挥着重要的养老福利保障作用。本文通过对浙 江省衢州市28 个村的考察，根据村规民约与养老福利的联结度和从村规民约到养老福利的可及性，将村规民约对农村养老福利的作用机制划分为理想型、松散型、悬浮型、脆弱型等四种类型。理想型作用机制主要表现为：村规民约起草修订中的多方参与，村规民约修订中对老年人福利保障的重视，乡贤能人的示范效应，村集体经济优势的发挥；松散型作用机制的主要表现为：养老福利保障推进中对村庄共同体的培育和建设，乡贤能人回村任职对村集体增收致富的带动，村规民约推行中对“量化”奖惩的落实；悬浮型作用机制主要表现为：涉及农村养老的奖惩措施执行力不足，“纸面”福利与村庄治理的脱嵌；脆弱型作用机制主要表现为：立约程序形式化引致养老福利内容模板化，村干部治村能力不足限制养老福利供给，村庄自治力量薄弱造成村规民约推行困难。应根据村规民约对农村养老福利作用机制不同类型的特征，通过增强村规民约书面文本与农村养老福利内容的联结度和提升村规民约转化为实际养老福利保障的能力，引导其他类型向理想型作用机制类型转化，实现农村养老福利保障能力的再造", "link": "content/CN/卢瑶玥 等 - 2023 - 村规民约对农村养老福利的作用机制分析——基于浙江省衢州市28个村的观察.html"}, {"title": "乡村社会诚信建设中的连带责任机制", "authors": "印子", "year": "2022", "language": "CN", "affiliation": "性成果。感谢中南财经政法大学法学院、国家治理学院陈柏峰教授提供调研帮助，感谢石建、刘雪姣、吕健俊、孙冲、李爱爽、陈伟协助完成资料收集工作，感谢匿名评审专家的建设性修改意见。当然，文责自负。-38-", "journal": "未自动识别", "abstract": "为了有效提升基层治理公共性，乡村社会诚信建设成为乡村治理能力建设的重要内容。乡 村社会诚信建设依靠连带责任机制发挥作用，通过诚信积分制来强化对社会成员的行为约束。连带责任机制表现为治理效用导向的利益连带，通过强化社会治理事务之间、家庭成员行为责任之间的利益关联，重构基层治理的公共性。连带责任机制治理效能的形成，不仅得益于社会治理机制的创新，还根源于乡村社会中以家庭为本位的社会观念。这促使社会成员将外部赋予自己的连带性义务，内化为社会治理的参与性。诚信积分制实践中出现的连带不当和惩戒扩大化问题，既违背了权利保护原则，也妨碍了集体成员权的实现，存在明显的合法性不足。要增强乡村社会诚信建设中连带责任机制的适用性，需要明确村级组织在诚信积分制实施上的权力范围、建设村级诚信积分制与基层行政系统之间的衔接机制、完善与连带责任机制相关的村规民约备案审查制度", "link": "content/CN/印子 - 2022 - 乡村社会诚信建设中的连带责任机制.html"}, {"title": "法治社会建设中村规民约的定位与功用", "authors": "印子", "year": "2023", "language": "CN", "affiliation": "印子，中南财经政法大学法学院讲师", "journal": "第37卷第1期总第一七九期 DOI:10．19648／j．cnki．jhustss1980．2023．01．05 摘要：在法治社会建设中，以村规民约为核心的特定社会规范，成为国家推动社会生活规范化的制度载体", "abstract": "在法治社会建设中，以村规民约为核心的特定社会规范，成为国家推动社会生活规范化的制度载体 在规范属性上，村规民约是与法律相协同的特定社会规范，具有鲜明的政策指向性。其执行力依赖自身在特定地域内的社会合法性，在实施中通过基层民主方式形成社会确认。在制度功能上，村规民约具备良好的社会适应性，有助于降低正式制度的实施成本，弥补法律、政策的不足。村规民约的实施，有利于在村民自治框架下强化法治建设，统筹德治建设，赋予自治以实质性内容；有助于在具体治理场域中促进“三治”结合，推动社会治理的法治化。法治社会建设应当克服法治工具主义立场，强化对综", "link": "content/CN/印子 - 2023 - 法治社会建设中村规民约的定位与功用.html"}, {"title": "村规民约嵌入新时代乡村治理的有效性——基于J省的个案研究", "authors": "向颖", "year": "2023", "language": "CN", "affiliation": "向颖（1979－），女，湖南郴州人，贵州民族大学社会学院博士研究生，研究方向为基层社会治理", "journal": "社会科学家 2023 年第06 期意见，共同讨论和制定与社情民意结合的村规民约，把孝道礼仪、禁赌禁毒、纠纷处理等内容写入村规民约，在新农村建设的拆建、施工中发挥了积极的促进作用。该村刘家组共拆建违章烂屋13607 平方米，新建文化长廊300", "abstract": "从社会学制度主义看，村规民约是一种遵循乡土社会内生逻辑而形成的，用以调整人际关系、规范个体行为、维护社会稳定的非正式制度。新时代乡村治理背景下如何发挥村规民约的治理效用，具有学理拓深及实践探索的双重意义。通过J 省的个案研究发现，村规民约通过嵌入乡村社会治理体系的自治、法治、德治三维度，发挥有效治理的重要作用：在村规民约的制定、执行和实施效果过程中打造“人人有责、人人尽责、人人享有”的社会治理机制，激发乡村自治主体性；通过与国家法治的互促互生来调整、监督乡村社会关系，体现乡村法治的时代性和工具性；通过构建由个人品德到家庭美德并推及社会公德的乡村道德价值谱系，发挥乡村德治功能。但仍需坚持“四个注重”，进一步增进“三治结合”的治理效能：注重引导村规民约的价值导向；注重创新村规民约的内容体系；注重强化村规民约的践行能力；注重健全村规民约的运行机制，以提升乡村社会治理绩效、促进乡村全面振兴", "link": "content/CN/向颖 - 2023 - 村规民约嵌入新时代乡村治理的有效性——基于J省的个案研究.html"}, {"title": "村庄价值观的共同基调与地方风俗——基于万级村庄村规民约文本的大数据分析", "authors": "吕鹏和刘金龙", "year": "2024", "language": "CN", "affiliation": "吕鹏，中国社会科学院社会学研究所，中国社会科学院大学数字中国研究中心教授、博士生导师", "journal": "学术研究", "abstract": "村规民约在中国乡村治理中扮演着成风化俗的角色，是推进农村现代化尤其是精神文明建设的重要", "link": "content/CN/吕鹏和刘金龙 - 2024 - 村庄价值观的共同基调与地方风俗——基于万级村庄村规民约文本的大数据分析.html"}, {"title": "村规民约的合法性审查：模式及其制度建构", "authors": "周林", "year": "2023", "language": "CN", "affiliation": "周林（1995—），男，江西赣州人，博士，华中师范大学法学院讲师，主要研究方向：基层治理法治化", "journal": "Journal of Hebei University", "abstract": "实践表明，我国大量村规民约存在各种类型的合法性问题，这不仅影响国家法制统一，也可能损害村民合法权益，对其加强合法性审查确有必要。村规民约的合法性审查主要包含三种模式：村委会主导的自主审查模式、基层司法所主导的辅助审查模式、各级立法主体与人民法院共同主导的强制审查模式。在自主审查当中，村委会应当通过村居法律顾问、“法律明白人”等将合法性审查贯穿村规民约制定与实施整个过程。在辅助审查当中，基层司法所应当强化村规民约备案审查，进一步排除合法性问题。在强制审查当中，各级立法主体可以通过审查决定或立法解释的方式对违反其所制定的法律法规的村规民约作合法性审查。各级法院在个案裁判当中，一方面可以直接援引各级立法主体作出的审查决定或者立法解释，作为评判村规民约合法性的根据；另一方面，对于明显与法律法规相抵触的村规民约，人民法院也可以进行直接审查或者通过相对隐含的方式进行“效力排除”。自主审查和辅助审查能够通过“柔性纠错”的方式矫正村规民约中的合法性问题，更利于村民自治的有效实现，但从审查实效来看，强制审查才能真正捍卫国家法制统一", "link": "content/CN/周林 - 2023 - 村规民约的合法性审查：模式及其制度建构.html"}, {"title": "激励、引导和规制乡村振兴中农民主体作用何以有效发挥——基于积分制、村规民约和农村综合信用体系的对比分析", "authors": "唐丽霞和丁悦", "year": "2022", "language": "CN", "affiliation": "唐丽霞，中国农业大学人文与发展学院教授，博士生导师，主要研究方向: 扶贫和乡村发展政策研究、中", "journal": "8 4 1 贵州社会科学总第392 期用的至少有两类因素，即物质激励和声誉激励。物质激励方面是将村级事务与村民利益紧密联系起来，通过积分兑礼品、积分换分红、积分换服务等形式激励村民参与。声誉激励方面，村庄熟人社会的环境下，“面子”“声誉”等", "abstract": "地方治理困境的重要原因是难以发挥农民主体作用，因此探寻发挥农民主体作用的关键机制成为核心问题。近年来一些地方的探索取得实效，如云南省安宁市F 村的积分制、Y 村的村规民约和内蒙古赤峰市的农村综合信用体系。三种模式均与村民建立紧密联结、挖掘农民价值和提供展示平台，但因在农民主体定位、动力来源、运行方式和互动方式方面存在差异，所以形成了以激励、引导和规制为核心的三种不同内生机制，并在每个模式中各有侧重地促进农民主体作用发挥。三类内生机制都以满足农民需求为导向激活治理末梢，以尊重农民地位为基石转变互动模式和以扩大农民选择为平台强化监督制衡。在政策设计时若能考虑以三类机制为突破口，或能促进农民主体作用发挥", "link": "content/CN/唐丽霞和丁悦 - 2022 - 激励、引导和规制乡村振兴中农民主体作用何以有效发挥——基于积分制、村规民约和农村综合信用体系的对比分析.html"}, {"title": "农村集体经济组织成员权界定主体：理论、现状与制度设计", "authors": "唐浩和张聪", "year": "2022", "language": "CN", "affiliation": "农村集体经济组织成员权界定主体：理论、现状与制度设计唐浩，张聪 *（湖南农业大学经济学院，湖南长沙 410128）", "journal": "农业现代化研究", "abstract": "界定集体经济组织成员权是落实农民土地承包权、宅基地资格权、集体收益分配权的前置性条件。当前，集体经济组织成员权界定的矛盾和纠纷较多，谁来界定集体经济组织成员权即集体经济组织成员权界定主体问题是定纷止争的关键所在。本文基于集体经济组织成员权界定主体问题的理论阐释，分析集体经济组织成员权界定主体的现状，提出了集体经济组织成员权界定主体的相关制度设计，并以广东省南海区为例实证集体经济组织成员权界定主体问题。研究表明，集体经济组织成员权界定主体问题需从集权与分权、内部规则与外部规则、国家法与习惯法、关系产权四个理论视角，深入分析界定前的现实、界定中的成本和界定后的效果。界定集体经济组织成员权需由国家及集体经济组织共同来完成。争议较大、带有普遍性、外部性很强的集体经济组织成员权界定问题由国家通过制定基本标准来界定，由于信息问题难以界定的或界定成本很高的问题由集体经济组织通过制定具体标准来界定。广东省南海区界定集体经济组织成员权的成功实践表明，国家及集体经济组织共同界定集体经济组织成员权是可行和有效的", "link": "content/CN/唐浩和张聪 - 2022 - 农村集体经济组织成员权界定主体：理论、现状与制度设计.html"}, {"title": "乡村治理视野下党规与村规民约的协同互动", "authors": "姚俊智", "year": "2022", "language": "CN", "affiliation": "姚俊智，华南理工大学法学院博士研究生，主要研究方向为法律社会学", "journal": "《中共福建省委党校（福建行政学院）学报》2022年第1期 乡村治理视野下党规与村规民约的协同互动姚俊智 摘要：乡村治理现代化是国家治理现代化的必然要求，乡村善治需要正式制度与非正式制度的融合发展。党规与村规民约都是国家治理体系的有机组成，也", "abstract": "乡村治理现代化是国家治理现代化的必然要求，乡村善治需要正式制度与非正式制度的融合发展。党规与村规民约都是国家治理体系的有机组成，也是国家治理能力在乡村社会施展的有效资源，两者在新时代乡村社会“三治融合”实践中具有功能同构的契合性。党规不仅强化村规民约的合法性，促进村规民约在性质地位、内容及程序方面的现代转型，而且推动村规民约的有效实施，由此保障村规民约制度建设。同时，村规民约也促进着党规制度建设，一方面通过促成和强化党规的“进场”和“在场”推动党规嵌入乡村社会，另一方面为完善党规制度提供群众智识、夯实群众基础。未来的乡村治理实践仍需重视两者的协同互动，以达成“最适宜的善治”", "link": "content/CN/姚俊智 - 2022 - 乡村治理视野下党规与村规民约的协同互动.html"}, {"title": "断裂与更替：普及时期村规民约的法治化", "authors": "孙梦和江保国", "year": "2022", "language": "CN", "affiliation": "孙梦，重庆大学法学院博士生，华南农业大学人文与法学学院讲师; 江保国，法学博士，华南农业大学人文与法学学院教授", "journal": "山东大学学报( 哲学社会科学版)", "abstract": "村规民约进入普及化新时期后，日益突出的授权性、法定性特征使其在外延、属性和适用等方面与历史上的村规民约出现了一定的断裂，面临着国家意志过度注入、文本内容形式化、规范结构不完整、适用场域空心化等新问题。法学理论和制度建设需要与时俱进地更替，特别是协调好授权性与合意性之间的关系，在时机成熟时制定村规民约立法，将间接的仲裁介入作为国家调控村规民约的主要方式，完善村规民约的规范结构，创新村规民约工作机制，在与自治、德治的融合中寻找法治化的路径", "link": "content/CN/孙梦和江保国 - 2022 - 断裂与更替：普及时期村规民约的法治化.html"}, {"title": "数字素养对肉羊养殖户疫病规范预防行为的影响——基于村规民约的调节效应", "authors": "康允泽 等", "year": "2025", "language": "CN", "affiliation": "1. 宁夏大学经济管理学院,银川", "journal": "未自动识别", "abstract": "To improve animal disease prevention, enhance livestock husbandry, this study utilized survey data from meat sheep Autonomous Region. A multinomial probit model and IV-Probit model literacy on farmers’standardized disease prevention behaviors and the that digital literacy had a significant positive influence on farmers’regulations, as the moderating variable, were divided into guiding and positive influence of digital literacy on farmers’standardized disease disease prevention behaviors were observed based on farm size; large-scale while the small-scale farmers showed a stronger preference for animal standardized disease prevention behavior. For this reason, the author training, formulating standardized and legally village rules and regulations for disease prevention and control. Additionally, the government practices.", "link": "content/CN/康允泽 等 - 2025 - 数字素养对肉羊养殖户疫病规范预防行为的影响——基于村规民约的调节效应.html"}, {"title": "通过村规民约促进国家认同——以西藏自治区53个行政村的实践为对象", "authors": "张晗", "year": "2021", "language": "CN", "affiliation": "村规民约西藏自治区国家认同文本内容参与实践   引言   但根据过往的研究，村规民约仅仅在面：第一析；？第二，对村规民约进行治理性分析，如对其与国家法的关系，以及其治理效能进行   ＊ 张晗，西南政法大学博士研究生。 “村规民约 ① 这里需要特别澄清一下“乡规民约”与“我国法律中主要采用‘村规民约’一词，‘乡规民约‘村规民约约’与’在使用上并无严格区分，两者可以通用", "journal": "但根据过往的研究", "abstract": "近年来，村规民约在社会治理中发挥了积极作用，并逐渐获得全国   “乡土权威”  村规民约？已成为推行村民自治、创新乡村治理机制、基层治理法治化的有效载体。  一般的社会治理层面发挥作用。其集中表现在两个方  ，对村规民约进行制度性分析，如对其功能、程序、内容、性质与特征等进行分  ”二者的区别。正如我国学者陈寒非、高其才所说： ’主要在文化传承意义上使用，但在大多数场合‘乡规民  ”（参见陈寒非、高其才：《乡规民约在乡村治理中   一词，以更符合调研实践情况。 ", "link": "content/CN/张晗 - 2021 - 通过村规民约促进国家认同——以西藏自治区53个行政村的实践为对象.html"}, {"title": "推进农村移风易俗的治理成效、挑战与路径探索", "authors": "张浩和苟天来", "year": "2025", "language": "CN", "affiliation": "张浩，中国社会科学院社会学研究所研究员，中国社会科学院大学社会与民族学院教授、博士生导", "journal": "未自动识别", "abstract": "近年来国家大力推进农村移风易俗工作，乡村中以往普遍存在的人情酒席、婚丧陋习等不 良社会风气得到有力整治。与此同时，乡村社会在移风易俗、乡风文明方面依然面临着一些挑战，主要包括：部分地区高价彩礼、厚葬薄养、讲排场比阔气的现象依然突出，对农村传统礼俗和陈规陋习缺乏区分辨识，村规民约未能在移风易俗方面发挥应有的作用，部分地方移风易俗行动流于简单化、形式化。建议持续推进农村移风易俗，注重引领农村新风，尊重农民群众在推进移风易俗中的意愿和主体地位，充分发挥村规民约在推进农村移风易俗中的作用，推动社会力量共同参与移风易俗治理，通过审慎辨别区分农村传统礼俗", "link": "content/CN/张浩和苟天来 - 2025 - 推进农村移风易俗的治理成效、挑战与路径探索.html"}, {"title": "数字法学的前提性命题与核心范式", "authors": "彭诚信", "year": "2023", "language": "CN", "affiliation": "未自动识别", "journal": "未自动识别", "abstract": "未自动识别", "link": "content/CN/彭诚信 - 2023 - 数字法学的前提性命题与核心范式.html"}, {"title": "数字法学的前提性命题与核心范式_1", "authors": "彭诚信", "year": "2023", "language": "CN", "affiliation": "上海交通大学凯原法学院教授。本文系2018 年度国家社科基金重大项目“大数据时代个人数据保护与数据权利体系研究”（项目批准号：18ZDA145）的阶段性成果", "journal": "厘清其前提性命题与核心范式是确定学科设置与从事学理研究", "abstract": "未自动识别", "link": "content/CN/彭诚信 - 2023 - 数字法学的前提性命题与核心范式_1.html"}, {"title": "村民自治监督中“责令改正”的适用困境、工具转向及审查进路", "authors": "徐航 等", "year": "2023", "language": "CN", "affiliation": "1．徐航( 1985—)，男，河南郑州人，法学博士，中共河南省委党校法学教研部副教授; 2．张陶陶( 2002—)，女，河南郑州", "journal": "华北水利水电大学刑事司法研究", "abstract": "《村委会组织法》规定了乡镇政府具有监督村民自治的“责令改正”职责，但在履责方 式、程度、法律后果等方面的规定缺失，导致实践中监督流于形式，且司法机关很难统一审查标准，提起民事诉讼的，有近90%的起诉均被以“村民自治事项不属于受案范围”为由不予立案或裁定驳回起诉。其中，亦有部分法院指出，如果认为村里的分配方案或决定侵犯了人身权利、民主权利和合法财产权利，可以根据《中华人民共和国村民委员会组织法》( 以下简称《村委会组织法》) 第二十七条规定向有关部门申请“责令改正”( 郑州市中级人民法院〔2021〕豫01 民终10800 号民事裁定书)。这为村民自治纠纷提供了行政救济途径。然而，随之出现的新问题是，在现有的法律规范体系中，“责令改正”的行使及其救济问题却存在制 ( 2022DXXTZDDYKT053) 和河南省哲学社会科学年度项目“党内法规制度治理效能提升的实践研究”( 2022BFX023) 的阶人，华北水利水电大学刑事司法研究中心研究助理; 3．魏小雨( 1991—)，女，河南郑州人，法学博士，中共河南省委党校法", "link": "content/CN/徐航 等 - 2023 - 村民自治监督中“责令改正”的适用困境、工具转向及审查进路.html"}, {"title": "村规民约中责任条款的效力——以黔东南的民族村寨为例", "authors": "曹伊清和翁静雨", "year": "2023", "language": "CN", "affiliation": "第44卷总第254期）Guizhou Ethnic Studies（Vol.44.General.No.254）2023年第4期贵州民族研究 No.4，2023 村规民约中责任条款的效力曹伊清翁静雨（同济大学法学院，上海 200092）于社会自治规范，其效力取决于规定的事项是否属于村民自治事项，以及是否处置了村民不能让渡的权利", "journal": "未自动识别", "abstract": "在民族村寨的村规民约中，既有传统习惯规则处罚方式，也有现代的责任方式。对于责任条款的效力，在理论和实践中还存在不同的认识。村规民约中责任条款不能一概认定为违约责任或者处罚，而是根据内容区分其性质判断责任条款的效力。村规民约中的责任条款包括调整不平等关系的社会自治规范以及平等关系的契约。民事契约部分的效力取决于是否违反《民法典》关于合同无效的规定，而责任条款中调整村级组织与村民之间的不平等关系的部分，属 customary law, but also modern responsibility methods. However, there are different views on the validity of liability clause in practice and theory. The liability clauses in the village rules cannot be collectively recognized as liability of contract or punishment. The validity of the liability clauses is judged according to their nature. The responsibility clause in the village regulations includes the social autonomy norm to adjust the unequal relationship and the contract to adjust the equal relationship. The validity of the civil contract part depends on whether it violates the provisions of the Civil Code on the invalidity of the contract. The validity of the social autonomy norm part depends on whether the stipulated matters [作者] 曹伊清，博士，同济大学法学院教授，从事宪法与行政法学、房地产法研究；翁静雨，女，同济大学法学院博士研究生，从", "link": "content/CN/曹伊清和翁静雨 - 2023 - 村规民约中责任条款的效力——以黔东南的民族村寨为例.html"}, {"title": "转型期民族地区村规民约基本类型与评价标准及其优化——基于宁夏五村村规民约文本", "authors": "李修懿", "year": "2024", "language": "CN", "affiliation": "李修懿，女，宁夏海原人，东南大学法学院博士研究生，主要研究方向为行政法学", "journal": "No.1，2024（Gen，No.9） 摘要：村规民约是民族地区实现有效治理的重要机制，在转型期民族乡村治理中发挥着积极作用。对宁夏五个 ［1］，脆弱的小农经济、力量不均的 ［2］，民族地区 ［3］。习近 转型期民族地区村规民约基本类型与评", "abstract": "村规民约是民族地区实现有效治理的重要机制，在转型期民族乡村治理中发挥着积极作用。对宁夏五个 ［1］，脆弱的小农经济、力量不均的 ［2］，民族地区 ［3］。习近 转型期民族地区村规民约基本类型与评价标准及其优化行政村实地调研后发现，民族地区村规民约构成内容复杂、形式多样，兼具地域性与政治性。就其类型看可分为教化型、惩戒型、激励型，故而在评价标准上不能单一。应以法政策和法理论的评价体系为参考，形成内容合法性、形式合理性、程序参与性的多重评价标准。针对各个类型的村规民约在治理实践中的制度偏差，可从内容合法性与合理性、乡村虽地处偏远但发展趋势总体亦是如此。自2001年农村税费改革、2006年全面取消农业税以来，改革冲击着熟人社会的传统秩序，催生了民族地区农村的市场化和城镇化发展，同时也带来了治理难的困境平总书记在党的二十大报告中指出：“全面推进乡村振兴。全面建设社会主义现代化国家，最艰巨最繁重的任务仍然在农村……推动各地因地制宜制定移风易俗规范，强化村规民约约束作用”①，可见，在当下社会转型期和国家乡村振兴的战略背景下，民族地区乡村社会得以健康发展和建设，势必要通过各种治理机制不断最早在1987年发布的《中华人民共和国村民委员会组织法（试行）》中首次提出了“村规民约”这一词的用", "link": "content/CN/李修懿 - 2024 - 转型期民族地区村规民约基本类型与评价标准及其优化——基于宁夏五村村规民约文本.html"}, {"title": "“三治结合”当代村规民约的变革调适路径", "authors": "李天助", "year": "2021", "language": "CN", "affiliation": "三治结合”指的是自治、法治、德治相结合，既是 ＊ 李天助，湘潭大学法学院博士研究生。  ① 十九大报告提出务院关于实施乡村振兴战略的意见》提出《最高人民法院关于为实施乡村振兴战略提供司法服务和保障的意见》提出“促进完善乡村自治、法治、德治相结合的治理体系", "journal": "黔东南村寨院学报", "abstract": "长期以来，村规民约在乡村事务管理、社会秩序维护和矛盾纠纷化   ”的乡村治理体系的核心内涵是：  一不可，相辅相成，齐头并进，共同促进当代村规民约  ”村规民约变革调适乡村治理   一种乡村治理体系和治理理念，①  “加强农村基础工作，健全自治、法治、德治相结合的乡村治理体系”，《中共中央、国  “坚持自治、法治、德治相结合，确保乡村社会充满活力、和谐有序”“树立自治法治德治相结合理念， ” ", "link": "content/CN/李天助 - 2021 - “三治结合”当代村规民约的变革调适路径.html"}, {"title": "新时代村规民约中的生态环境治理规范基于187份样本的分析", "authors": "李奇伟", "year": "2022", "language": "CN", "affiliation": "未自动识别", "journal": "未自动识别", "abstract": "在新时期, 生态环境治理规范已经成为村规民约的重要组成部分。从规范形式上看,“三字语”“顺口溜”“山歌民歌”等多样形式获得推广; 从规范内容上看, 垃圾分类、门前“三包”、卫生收费、检查评比等制度初见雏形。从功能价值上看, 新时代村规民约承载了社会主义核心价值观引领、促进法治社会建设与全民守法秩序形成等法治价值。未来, 村规民约应朝着“价值引领、合法合规、群众认可、管用有效”的方向发展, 逐步构建形式灵活、内容规范的规则体系, 健全政府指导、基层自治的形成机制, 完善内外结合、充分动员的效力机制, 以构筑现代基层社会治理的制度屏障", "link": "content/CN/李奇伟 - 2022 - 新时代村规民约中的生态环境治理规范基于187份样本的分析.html"}, {"title": "从“上墙”到“落地”村规民约效力实现机理研究——基于两个案例的比较", "authors": "李媛媛和贺树月", "year": "2022", "language": "CN", "affiliation": "李媛媛，山东农业大学马克思主义学院教授，博士，山东泰安，271018", "journal": "未自动识别", "abstract": "村规民约是我国农村治理的重要规范，但在部分地区仍存在形式化和虚置化问题，未能从“上墙”走向“落地”。本文基于制度要素和制度嵌入理论，构建了整合式分析框架，对H 村和X 村两个案例进行比较，探究村规民约效力实现的内在机理。研究发现，是否具备相应的制度要素，并与外部社会网络相嵌合，是影响两村村规民约效力实现的重要因素。基于两村的案例比较为村规 并推动村规民约嵌入乡村社会网络，寻求乡村内生性力量的支持，形成多元主体共建共治共享的合力", "link": "content/CN/李媛媛和贺树月 - 2022 - 从“上墙”到“落地”村规民约效力实现机理研究——基于两个案例的比较.html"}, {"title": "新质生产力赋能乡村治理效能提升的路径——基于村规民约改革的分析", "authors": "李文轩", "year": "2024", "language": "CN", "affiliation": "李文轩，云南民族大学社会学院博士研究生，百色学院人文与公共管理学院副教授", "journal": "期云南民族大学学报（哲学社会科学版）", "abstract": "新质生产力以创新驱动为核心竞争力，技术进步为坚实基础，实效评估为检验标准，其发展要求为乡村治理改革指明了新方向，促使乡村治理非正式制度更加注重形式显性化、过程可参与以及结果有效性。作为乡村治理的一种非正式制度，村规民约生动体现了乡村治理有效的内在逻辑。在新质生产力赋能下，广大乡村应以村规民约革新实践为契机，关联传统礼俗与日常生活释放礼治的形塑力量，利用传统管理方式与现代技术激发共治的整合动力，沟通地方知识和国家制度增强法治的规训功能，以期提升乡村治理效能", "link": "content/CN/李文轩 - 2024 - 新质生产力赋能乡村治理效能提升的路径——基于村规民约改革的分析.html"}, {"title": "村规民约在生态环境治理中的困境与提升", "authors": "李爱年和岳亚鹏", "year": "2024", "language": "CN", "affiliation": "《中共中央关于全面推进依法治国若干重大问题的决定》, 载中国政府网, https: / / www. gov. cn/ zhengce/ 2014-10 / 28 / content_ 2771946. htm, 访问日期: 2024-09-15", "journal": "洛阳工学院学报(社会科学版)", "abstract": "村规民约承载着农村生态环境治理的重要任务。分析可知, 村规民约的生态环境治理作用受国家认可, 其中的生态环境规范与时俱进, 治理过程体现出自治性及与法的交融性。但目前村规民约在生态环境治理中还存在文本呈现难以回应农村生态环境治理要求, 实施过程受乡土生态环境理念阻碍, 环境法治保障力度不足等困境。为此, 应当加强农村地区环境法治教育, 完善村规民约的立约程序与实体架构, 加强村规民约与环境法治的衔接", "link": "content/CN/李爱年和岳亚鹏 - 2024 - 村规民约在生态环境治理中的困境与提升.html"}, {"title": "论基层应急法治能力提升的三重向度", "authors": "李牧和董明皓", "year": "2022", "language": "CN", "affiliation": "a. 法学与人文社会学院;b. 马克思主义学院, 430070) 武汉", "journal": "法学研究", "abstract": "基层应急法治能力提升,是加快推进基层治理体系和治理能力现代化 2021 年7 月12 日,党中央、国务院颁布了《关于加强基层治理体系和治理能力现", "link": "content/CN/李牧和董明皓 - 2022 - 论基层应急法治能力提升的三重向度.html"}, {"title": "新内源发展：民族地区乡村文化治理机制——以青海省H市为例", "authors": "杨晓菲和杜俊华", "year": "2025", "language": "CN", "affiliation": "杨晓菲,重庆大学博士研究生,主要研究马克思主义中国化;杜俊华,重庆大学教授,主要研究马克", "journal": "Journal of South-Central Minzu", "abstract": "在市场经济与外来文化冲击下,单纯依赖乡村内生资源的自我调适已无法实现有效的文化治理,制约了民族地区乡村文化的繁荣发展。基于新内源发展理论,结合对青海省H 市移风易俗实践的调研,发现通过主体性培育、组织化建设、制度赋能,可建构整合乡村场域\" 地方\" 与\" 超地方\" 治理资源的乡村文化治理机制。H 市移风易俗的顺利推行表明,新内源发展机制不仅促进了内外资源有效互动,产生了发展动力,还通过多元主体共治和多元规范协同的运行逻辑,推动了 具治理对象与治理工具的双重属性[3]。风俗作为文化的一项重要内容,以其为治理对象的移风易俗行动,成为了乡村振兴背景下顺利推进乡村文化治理的重要抓手。移风易俗通过加强村民的文化自觉和文化修养,增强其文化认同感和文化自信心,提高文化传承和创新能力,推动文化产业发展,为乡村振兴提供新的动力和支撑。鉴于移风易俗的重要作用,党的十九大以来,中央一号文件连续对农村陈规陋习整治作出了部署,明确要求\" 推进农村婚俗改革试点和殡葬习俗改革,开展高价彩礼、大操大办等移风易俗重点领域突出问题专项治理\"。因此,在全面实", "link": "content/CN/杨晓菲和杜俊华 - 2025 - 新内源发展：民族地区乡村文化治理机制——以青海省H市为例.html"}, {"title": "村规民约中环境规制的生演逻辑——基于制度经济学的解释", "authors": "林雅静和胡苑", "year": "2023", "language": "CN", "affiliation": "《村规民约》, 赤峰市元宝山区政府频道http: / / www. ybs. gov. cn/ ybszdjw/ 607451 / 607464 / 623867 / index. html, 访问日期: 2021 年6 月30 日", "journal": "未自动识别", "abstract": "以村规民约形式存在的环境规制可以为乡村环境治理“保驾护航”。借用制度经济学理论有助于理顺村规民约中环境规制的产生、演变逻辑。起初, 乡村环境问题刺激了环境的规制需求, 后来基于共享心智模型的路径依赖环境规制成形于村规民约。然而, 环境规制的演进涉及村庄治权与国家治权的角力, 为寻求制度结构性博弈均衡的结果, 需重点探讨村规民约与正式法律体系间实现环境共治均衡的契机及均衡的界点, 实现“自然秩序”与“法定秩序”融合, 促进村民遵守规则维持生态可持续发展", "link": "content/CN/林雅静和胡苑 - 2023 - 村规民约中环境规制的生演逻辑——基于制度经济学的解释.html"}, {"title": "法治乡村建设论纲", "authors": "江必新和过安衡", "year": "2022", "language": "CN", "affiliation": "江必新，法学博士，中南大学法学院教授、博士生导师，第十三届全国人民代表大会宪法和法律委员会副主任委员，中国法学会", "journal": "调的，推进社会主义建设“还是要靠法制，搞法制靠得住些”［1］（第3卷，P．379）。法治乡村要求乡村治理过程中的任何一个环节都不得与现代法治的基本原则和基本精神相悖。完善乡村振兴立法，是法治乡村建设的前提。（一）要进一步完善涉农法律制度体系", "abstract": "推进法治乡村建设，是实施乡村振兴战略的内在要求，是全面推进依法治国的重要基础。建设法治乡村，需要不断完善乡村振兴立法和乡村治理结构，通过推行家庭文明诚信档案制度、促进“三治”有效融合，牢牢守住耕地保护、粮食安全、生态保护、农民权益保护等四条红线，正确处理自治与他治的关系、公法与私法的融合治理、法律法规授权或课责农村自治组织机制，强化乡村法治宣传教育，夯实乡村法治之基，从而助力法治中国建设", "link": "content/CN/江必新和过安衡 - 2022 - 法治乡村建设论纲.html"}, {"title": "从嵌入到融入：村规民约的实效性转化机制——以广东省H市D区村规民约为范本", "authors": "潘香军和王牧", "year": "2024", "language": "CN", "affiliation": "潘香军(1997—),女,清华大学法学院博士生", "journal": "期天津行政学院学报", "abstract": "当代村规民约存在表面嵌入乡土社会而实际脱嵌的现象,须从形式嵌入向实质融入转变。D 区29 个行政村中的村规民约实施情况表明,村规民约的实效性转化经历了规范调适、资源吸纳与权威重塑三个阶段。村规民约兼具问题性、本土性、具象性,能有效吸收团体、党政、市场等内外资源,在程序和结果两个方面具有权威性。同时,实效性转化的进路受到制度建构机制、关系整合机制与认知引导机制三重逻辑的驱动,村规民约由此从文本上的规则转变为融入日常行动的规范,在乡村治理中发挥实效性作用,实现了国家和社会的深度互嵌,提 规约,以及若干村民议定的某种规约 [1](p.3)。本文将在这一广义的概念范畴下展开讨论。村规民约具有契约性与合意性、本土性与地方性、民 [2],既是村民自治的产间性与非正式性等特征物,也是政府审查认可的结果,体现了国家意 [3]。村规民约在法治社会建设与基层治理中志具有广泛的作用,作为民主自治的规范依据,它有助于推动国家法的实施,维护公共秩序,传承 [4]。然而,村规民约也面临着主和弘扬公序良俗体虚化、内容泛化、实施弱化、效果散化等问 [5],这就需要我们全面审视、多措并举,纾解当题下村规民约陷入的困局", "link": "content/CN/潘香军和王牧 - 2024 - 从嵌入到融入：村规民约的实效性转化机制——以广东省H市D区村规民约为范本.html"}, {"title": "民族地区民事习惯嵌入乡村治理经验与模式研究——从甘肃民族地区几例民事习惯现存样态谈起", "authors": "牛绿花和马俊", "year": "2022", "language": "CN", "affiliation": "牛绿花，西北师范大学法学院教授，法学博士（兰州，730070）；马俊，新疆政法学院法学院教师（图木舒克，843806）", "journal": "Journal of Ethnic Culture", "abstract": "为探寻民事习惯究竟如何嵌入甘肃民族地区乡村治理而实现治理目的，以数个典型案例为切入点分析了民事习惯的静态表达和动态展演。民族地区民事习惯嵌入乡村治理自身应具备不违反法律法规、不违背公序良俗、获得民众认可与遵循等三个要素；通过调解、诉讼、诉调对接形式联动适用于乡村纠纷化解；在情理法互润与协调中通过自治深化、德治实化、法治强化民事习惯的乡村治理功效", "link": "content/CN/牛绿花和马俊 - 2022 - 民族地区民事习惯嵌入乡村治理经验与模式研究——从甘肃民族地区几例民事习惯现存样态谈起.html"}, {"title": "政策执行理论视角下村规民约运作与效果——基于Z市的调查研究", "authors": "王世强", "year": "2022", "language": "CN", "affiliation": "未自动识别", "journal": "成员的一种共同守则; 在宏观上, 推进村规民约建设则是国家的一项公共政策。村规民约政策的实施与农村社会关系的重新调整密切相关。以信念、风俗习惯、社会舆论为基础兼具有契约法理性质的村规民约可以与国家法律互为补充、相互作用①。从机制设计上来看", "abstract": "推进村规民约工作是我国改进农村社会治理方式的一项重要政策。为调查村规民约在农村基层社会治理中的运作与效果, 本研究对Z 市村规民约政策执行情况开展访谈调查, 基于政策执行理论的视角对调查结果进行分析。调查发现, 在农村基层社会, Z 市村规民约政策执行可以分为民间推动型、行政推动型和市场推动型三种不同模式, 分别具有自治驱动、权力驱动和利益驱动的特征。为使Z 市村规民约政策执行更富有成效, 需要通过执行机构规范化、执行手段合理化、执行过程互动化、执行机制长效化四种路径予以完善和提升", "link": "content/CN/王世强 - 2022 - 政策执行理论视角下村规民约运作与效果——基于Z市的调查研究.html"}, {"title": "村规民约如何助推乡村治理——基于功能演化与动力机制的分析", "authors": "王世强", "year": "2023", "language": "CN", "affiliation": "王世强（1980－），男，首都经济贸易大学城市经济与公共管理学院副教授，博士", "journal": "JOURNAL OF TIANJIN ADMINISTRATION INSTITUTE Jul", "abstract": "社会变迁对农村社会治理方式创新提出了新的要求，科学合理的治理工具可以为提高乡村治理能力提供支持。在治理现代化背景下，需要推动村规民约在法治、自治、德治等具体领域的功能演化，以此复兴、重塑和优化村规民约，推动传统村规民约在当代社会的时代性转变和创新性发展。作为一种族群性文化象征符号的村规民约在乡村治理中具有多重功能，如增强社会资本、促进社区自治、传播价值观念等。村规民约通过强化耦合式演进机制、内源性塑造机制和均衡性治理机制，能有效推进“三治融合”治理体系制度化实践、推动“三农”政策在基层自主落实、促进国家治理与村民自治动态协调。为了提高村规民约助推乡村治理的效能，应从整体规划、功能拓展和机制调试方面，完善村规民约制度顶层设计，构建发展型村规民约体系，以赋权推动多元参与格局的构建", "link": "content/CN/王世强 - 2023 - 村规民约如何助推乡村治理——基于功能演化与动力机制的分析.html"}, {"title": "传统、法治及身份：对中国农村女性土地权益受侵的审视", "authors": "王健", "year": "2022", "language": "CN", "affiliation": "未自动识别", "journal": "未自动识别", "abstract": "受传统观念和中国农村土地权利结构特征等因素的影响，中国农村女性土地权益受侵现象 在部分农村地区客观存在。本文研究发现：农村女性在土地承包经营和土地收益分配上处于弱势地位，获得的土地权益不长久、不稳定。农村各项土地权利以家庭为单位来实现，来自家庭内外部侵犯个人土地权益的威胁更容易发生在家庭中的女性成员身上。农村女性土地权益受侵涉及女性未婚、招婿、外嫁、离婚、丧偶等多种“身份”类型。传统观念下女性的“身份”类型会直接影响土地收益的分配决策，加深性别歧视的作用。非正式制度中歧视女性的陈规陋习是造成农村女性土地权益受侵的重要原因。应进一步完善农村女性土地权益的保护机制，促进社会性别平等和保障农村女性发展权", "link": "content/CN/王健 - 2022 - 传统、法治及身份：对中国农村女性土地权益受侵的审视.html"}, {"title": "以村规民约“接引”现代公民道德——基于浙江省Q市的考察", "authors": "王小章和吴达宇", "year": "2022", "language": "CN", "affiliation": "未自动识别", "journal": "浙江社会科学 ZHEJIANG SOCIAL SCIENCES 2022 年第11 期 No.11，2022 2022 年11 月 Nov.，2022 DOI:10.14167/j.zjss.2022.11.002 现代化进程带来了乡村社会", "abstract": "未自动识别", "link": "content/CN/王小章和吴达宇 - 2022 - 以村规民约“接引”现代公民道德——基于浙江省Q市的考察.html"}, {"title": "迭部地区乡村治理中“司哇”的转型及其功能研究", "authors": "玖玛草", "year": "2023", "language": "CN", "affiliation": "玖玛草（1985－），女（藏族），甘肃迭部人，兰州大学西北少数民族研究中心博士生，主要从事藏学、藏族习", "journal": "民族问题研究", "abstract": "新时代乡村振兴战略为民族地区发展带来了重要契机，不仅关乎民生福祉，更关乎民族地区 记物，寓指明断是非的纠纷解决方式。“司哇”（gzuba或gzubo），意为运用“司”（gzu）这种纠纷解决方式调解纠纷的民间调解人，亦指没有偏见，秉性公正的“公断人”。“司哇”调解的组成人员是随着具体纠纷需要而产生的，主要有“司倍”（gzudpon，首席调解员）“司奏”（gzumdzod，参谋合议人员）等。在迭部传统社会中人们把为人公正、遇到纠纷不仅能明辨是非且能仗义直言、并依循当地风俗习惯、习惯法等消除纠纷的民间调解人称之为“司哇”。因此，“司哇”不仅有“公断”的含义，也是一种职业名称，更是一种社会评价。（二）迭部“司哇”的产生及发展迭部县地处甘南藏族自治州东南部，白龙江上游秦岭山脉延伸之岷叠山峦地带。境内地势西北高东南低，白龙江从西向东横贯全县，岷山和叠山隔江绵延对峙，东部边缘被天险腊子口和“汉 gzuba），亦称“司吾”（ gzubo），两者意 ②文中田野调查资料主要源于甘南藏族自治州迭部县，调查时间为2017—2022年。文中藏文采用威利转写（Wylie）．", "link": "content/CN/玖玛草 - 2023 - 迭部地区乡村治理中“司哇”的转型及其功能研究.html"}, {"title": "论村规民约备案审查的制度构建", "authors": "申汪洋和彭娟", "year": "2025", "language": "CN", "affiliation": "未自动识别", "journal": "参见王小章、吴达宇:《以村规民约“接引”现代公民道德———基于浙江省Q 市的考察》, 载《浙江社会科学》2022 年第11 期", "abstract": "当前, 针对多元规范共存、多元秩序共治的现实, 要求建立分种类、多层次的备案审查机制, 而村规民约的备案审查制度则是其中的重要环节。村规民约的社会规范属性以及备案审查的监督权属性, 共同决定了村规民约备案审查乃是法治主导下的自治这一根本特征。在现代社会, 对村规民约进行备案审查制度设计不仅可以重塑村规民约的现代化外观, 而且能保障社会规范的多元化发展、符合多元化解纷机制的司法诉求。根据我国现有的治理结构和制度资源, 村规民约的备案审查可以借鉴规范性文件的备案审查制度以及符合社会治理的内在需求而具备实施上的可行性。对于村规民约备案审查制度的建构应当坚持以合法性原则维护法律的体系性、以合理性原则体现地域特色、以适度容忍原则实现社会秩序和法律秩序的互动调和。在具体标准的设计上, 需要明确乡镇政府作为村规民约的备案审查主体、遵循民主的备案审查程序、限定以“应备尽备、应审尽审、应纠尽纠”为备案审查范围、采用内外部相结合的备案审查方式、释放村规民约备案审查制度的普遍规范能力以及充分发挥附带性司法审查的救济作用。如此方能在保障社会规范活力的同时为法治建设注入新的活力", "link": "content/CN/申汪洋和彭娟 - 2025 - 论村规民约备案审查的制度构建.html"}, {"title": "村规民约在行政诉讼中的司法运用及其优化", "authors": "罗英和谷雨", "year": "2024", "language": "CN", "affiliation": "《高举中国特色社会主义伟大旗帜为全面建设社会主义现代化国家而团结奋斗———习近平同志代表第十九届中央委员会向大会作的报告摘登》, 载《人民日报》2022 年10 月17 日, 第2 版", "journal": "社会主义研究", "abstract": "学界对村规民约司法运用的讨论基本集中于民事诉讼领域, 有必要将关注点从民事诉讼领域拓展至行政诉讼领域。在行政诉讼中, 村规民约经过受案范围与法源的判断, 被运用至行政裁判的说理当中, 发挥着增强说服力、逻辑性与贴合性的重要功能。实践中, 行政法官对村规民约的运用主要在行为支撑依据、行为本身性质与行为附带审查三个方面存在着明显的选择分歧, 其根源主要在于村规民约在法源地位上、性质甄别上与审查路径上存在的不确定性。为进一步优化行政诉讼中的村规民约运用, 可以尝试从明晰村规民约法源地位、厘清自治行为构成要件、建构分阶层的审查程式上予以针对性探讨, 以期恰当发挥村规民约的实际效能", "link": "content/CN/罗英和谷雨 - 2024 - 村规民约在行政诉讼中的司法运用及其优化.html"}, {"title": "村规民约何以转化为实质秩序：建构机制与效能——基于18省份36个优秀村规民约的整体性分析", "authors": "苏曦凌和梁舒萍", "year": "2022", "language": "CN", "affiliation": "苏曦凌（1978—），男，广西师范大学政治与公共管理学院教授、博士生导师；梁舒萍（1997—），女，广西师范大学政治与公共管理学院研究生", "journal": "北京行政学院学报", "abstract": "村规民约需要通过国家建构，在一定的条件和机制下才能转换为乡村社会的实质运转秩序。以全国18个省份的36个村规民约建构的整体性考察入手，在分析国家建构村规民约的行动逻辑及其效果的基础上，探究转化的条件机制。文本层面建构的村规民约，仍处于“嵌入”而未达到“融入”乡村社会的效果，国家建构的规则要转化为运转的乡村秩序，就必须实现国家主导性政治势能与社会主体性社会动能的良性互动，直接运用的政治势能与间接激活的社会动能需要有机结合。强化教育濡化机制、健全多 不能脱离国家意志，在很大程度上仍然需要运用国家权力对乡村社会行为规则进行主导性建构，② 推动社会秩序的萌芽、成长、发展的主体性进化同时，村规民约建设，是规则建构与秩序生长的有机统一，有助于我们从一个较小的“切口”，更深入地理解国家建构的规则内生化为乡村社会实质运转秩序的条件机制这样一个更大的“问题”。一、村规民约建构乡村秩序的探索回顾与研究设计纵览传统社会中邻里乡人以相互协助救济为目的、互相劝勉并共同遵守的“乡约”制度建设，其实质是国家权力与基层社会的链接机制，国家与社会之间的相互作用、相互渗透贯穿于其中，“乡约效力或者因为官府的提倡可以增加，乡约精神 [2]。改革开放以也许因为官府的提倡愈加丧失”来，党和国家高度重视发挥村规民约在乡村治理秩序重塑中的重要作用。1988年6月试行的《中华--30", "link": "content/CN/苏曦凌和梁舒萍 - 2022 - 村规民约何以转化为实质秩序：建构机制与效能——基于18省份36个优秀村规民约的整体性分析.html"}, {"title": "村规民约、村干部信任与农户可再生资源利用行为——以秸秆资源化利用为例", "authors": "苏静 等", "year": "2024", "language": "CN", "affiliation": "苏静(1980—),女,湖南汨罗人,湖南师范大学公共管理学院教授,博士生导师,研究方向:农村基层治理、公共政策评估与统计建模", "journal": "南京工业大学学报(社会科学版)", "abstract": "农业可再生资源利用是实现农业可持续发展的重要举措。本文以秸秆资源化利用为例,基于湖南省农户的调查数据,运用Logit模型,分析了村规民约、村干部信任对农户可再生资源利用行为的影响。研究发现:第一,规范性村规民约和引导性村规民约均显著正向影响农户秸秆资源化利用行为,并且后者对农户秸秆资源化利用行为的促进效应要大于前者;第二,村干部品行信任和组织信任显著正向影响农户秸秆资源化利用行为,村干部能力信任对农户秸秆资源化利用行为的影响不显著;第三,村规民约与村干部信任对农户秸秆资源化利用行为存在一定的交互影响,村干部信任在村规民约与农户秸秆资源化利用行为中起到显著的正向调节作用,这主要来源于村干部组织信任的影响。据此,应进一步完善村规民约、加强村干部队伍建设、建立健全村庄环保监督组织和监督机制、加大宣介环保教育政策力度,从而切实提高农业秸秆等可再生资源利用率", "link": "content/CN/苏静 等 - 2024 - 村规民约、村干部信任与农户可再生资源利用行为——以秸秆资源化利用为例.html"}, {"title": "制度因素、环境素养对农户绿色生产行为的影响——基于入户调查的微观证据", "authors": "蒋琳莉 等", "year": "2021", "language": "CN", "affiliation": "/j．issn．1002 －1302．2021．22．002 制度因素、环境素养对农户绿色生产行为的影响———基于入户调查的微观证据蒋琳莉 1，2，陈楠 2，熊娜 2，罗云 3 ［1．五邑大学经济管理学院，广东江门529020; 2．广西民族大学经济学院，广西南宁530006; 多元化扶持政策", "journal": "—2 1—江苏农业科学 2021 年第49 卷第22 期 DOI:10．15889 /j．issn．1002 －1302．2021．22．002 制度因素、环境素养对农户绿色生产行为的影响———基于入户调查的微观证据蒋琳莉 1，2，陈楠 2", "abstract": "推进农业绿色发展是全面实施乡村生态振兴的一项重要任务，而农户绿色生产行为转变正是实现农业绿色 目前，众多学者对农户绿色生产行为进行了有益的探索与研究。聚焦农户绿色生产行为领域，学者们指出农户个体特征 ［2 －6］、家庭经营特征 ［7 －8］、外部环境特征 ［9 －10］、环境价值观和认知水平 ［11 －13］等是农户实施绿色生产行为的重要影响因素。有学者进一步探讨了制度因素与农户绿色生产行为的关系 ［14 －15］，夏佳奇等从环境规制和村规民约两方面探索了乡村环境治理问题 ［16］; 周家明等认为，村规民约能够增强乡村社会治安，保护自然资源与环境 ［17］; 盖豪等侧重研究政策宣传、项目示范、惩罚措施等政府规制对农户秸秆持续还田行为的影响 ［18］。此外，亦有部分文献开始研究环境素养对个体亲环境行为的影响，但环境素养的内涵和划分维度不尽相同。在Erdogan 的研究中，环境素养包含了技能和负责任的环境行为两大要素 ［19］; 相关研究在构建的环境素养体系中均含有环境认知和技能，郭清卉等纳入了环境责任感和社会规范 ［20］。刘妙品等则融合了环境情感和价值观 ［21］。上述研究大多重点考察农户对某一种绿色生产技术的采纳行为及其影响因素，忽略了农户在农业生产过程中可能同时采纳多种绿色生产技术的转型发展的关键。基于广西壮族自治区宾阳县、平南县、北流市和大新县等地406 份水稻种植农户调查问卷数据，运用Multivariate Probit 模型分析制度因素和环境素养对农户绿色生产行为的影响，并构建解释结构模型( ISM) 剖析关键影响因素之间的逻辑关联与层级结构。结果表明: ( 1) 制度因素层面的村规民约、项目示范显著影响农户间歇灌溉和病虫害防治行为; 环境素养层面的环境认知、环境情感、环境责任感对农户间歇灌溉、绿肥种植和病虫害防治行为均有显著正向影响。( 2) 农户绿色生产行为还受性别、年龄、教育水平等个体特征以及家庭收入、农机成本等经营特征的影响。( 3) 环境责任感、家庭收入作为表层直接因素，项目示范、环境认知、农机成本作为中层间接因素，村规民约、环境情感、土地流转作为深层根源因素，共同影响农户对绿色生产技术的联合采纳行为。为激发农户参与绿色农业生产的积极性，应建立健全生态环保村规民约、增强项目示范作用、强化绿色生产技术培训指导、规范土地流转市场、实施", "link": "content/CN/蒋琳莉 等 - 2021 - 制度因素、环境素养对农户绿色生产行为的影响——基于入户调查的微观证据.html"}, {"title": "从规约有效到治理有效——以村规民约中的惩罚性规条为研究对象", "authors": "袁方成和刘桓宁", "year": "2021", "language": "CN", "affiliation": "袁方成( 1978—)，男，湖北武汉人，华中师范大学中国农村综合改革协同创新研究中心主任、博士生导师，主要研究方向为地方政府与基层治理; 刘桓宁，华中师范大学中国农村综合改革协同创新研究中心研究助理", "journal": "Journal of Jiangsu Administration Institute No", "abstract": "村规民约中能否明确包括惩罚性规条，是当下乡村治理研究和实践中的焦点问题 重要工具。惩罚性规条的落地实践，有赖于村庄共同体内部的有序参与和外部的指导监督，国家法律法规规定之不足的需要，具有化解纠纷、处罚违犯者和教育群众的效果。［4］在风险可控性层面，村规民约的惩罚性措施存在侵犯村民合法权益的潜在风险，但可构建具体制度或执行规范对村规民约的制定和实施方面进行规范和监督。［5］而中立者的关注重点是惩罚性措施的风险溢出效应，即尽管村规民约总体上符合新形势下乡村治理要求，但部分惩罚性规条极易侵犯村民正当权利，从而成为矛盾爆发的导火线。［6］ 对于乡村治理是否需要惩罚性规条这一问题，当前的研究重点侧重于惩罚性规条的属性和特征，以及实施过程中的具体风险及其渗透", "link": "content/CN/袁方成和刘桓宁 - 2021 - 从规约有效到治理有效——以村规民约中的惩罚性规条为研究对象.html"}, {"title": "村规民约实施中村民参与的逻辑嬗变——基于A市F村的实证案例", "authors": "谢炜和郝宇青", "year": "2024", "language": "CN", "affiliation": "谢炜，华东师范大学公共管理学院教授、硕士生导师，MPA中心主任，纪检监察研究", "journal": "湖南农业大学学报", "abstract": "村规民约的普及推广，是自上而下的国家意图下沉与自下而上的主体对接形成的治理耦 合。村民参与作为村域公共生活的重要组成部分，不仅在形式上和实质上赋予了村民自我表达的机会，确保村民获得影响其自身生产生活质量的权利，更是保障了国家治理植入基层的合法性基础。在村规民约实施过程中，村民参与的成效受权威要素与动力要素的影响，立足“组织内嵌”和“自主动员”两个维度的强弱，可区分为弥散性参与、控制性参与、从属性参与和合作性参与等差异性类型，并借以识别村民参与从单向到互动、从利益到权利、从象征到实质、从被动到惯习的逻辑嬗变", "link": "content/CN/谢炜和郝宇青 - 2024 - 村规民约实施中村民参与的逻辑嬗变——基于A市F村的实证案例.html"}, {"title": "林地产权安全对林农非木质林产品绿色生产行为的影响", "authors": "谢芳婷 等", "year": "2025", "language": "CN", "affiliation": "3，沈月琴 1,2，朱臻 1,2（1. 浙江农林大学浙江省乡村振兴研究院，杭州 311300；2. 浙江农林大学经济管理学院，杭州 311300", "journal": "Journal of Natural Resources", "abstract": "林地产权安全是林农采取可持续生产行为的制度基石，而绿色生产行为是林农可持续 生产行为的具体表现形式。为厘清法律、事实、感知不同维度林地产权安全对林农绿色生产行为影响的作用机理，更好地为集体林权制度改革提供决策参考，基于产权理论和农户行为理论，采用浙江省和江西省集体林区2023 年655 个农户调研数据，运用Logit 模型和 OLogit 模型，分析不同维度的林地产权安全对林农绿色生产技术采纳行为和采纳程度的影响机理，并探讨林业技术培训和村规民约的调节效应。研究发现：（1）69% 的林农在林业经营过程中具有绿色生产行为，其平均林业绿色生产技术采纳数量为0.88 个。（2）法律、事（3）林业技术培训、村规民约在法律、事实、感知产权安全对林农采纳绿色生产技术概率的影响中具有显著正向调节作用。（4）林地产权安全对不同类型的林农影响程度不同，林业收入水平较高，林地规模较小的林农更易受到产权安全的影响。因此，在推进林业生产方式转型升级过程中，既要完善好林地产权相关制度，也要提高相关绿色生产培训和村规民约，构建有利于林业绿色发展的良好氛围", "link": "content/CN/谢芳婷 等 - 2025 - 林地产权安全对林农非木质林产品绿色生产行为的影响.html"}, {"title": "中国习惯法研究回顾与展望(1998-2022)——基于CSSCI数据库的CiteSpace可视化分析", "authors": "赵云璐和杨翠柏", "year": "2024", "language": "CN", "affiliation": "分布直接反映了研究学者对该领域的关注程度和该领域研究的发展速度。从发文数量考察得出, 就学术关注度来说, 习惯法研究的核心论文发文量经历了从激增到平稳的历程, 主要划分3 个阶段: (1) 起步期: 1998 年以前至2005 年。虽然我国习惯法研究的渊源可以 ① 参见李杰、陈超美:《CiteSpace 科技文本挖掘及可视化(第二版)》, 首都经济贸易大学出版2022 年版, 第3-5 页", "journal": "中国习惯法研究", "abstract": "为厘清习惯法研究脉络, 把握研究的科学发展规律并加强学科认识, 以CSSCI 数据库中收录的816 篇中国习惯法研究期刊论文作为研究样本, 采用文献计量法并利用Citespace5. 7. R2 软件, 绘制习惯法研究知识图谱。通过研 究文献的时空分布、作者合作网络、核心机构、期刊、", "link": "content/CN/赵云璐和杨翠柏 - 2024 - 中国习惯法研究回顾与展望(1998-2022)——基于CSSCI数据库的CiteSpace可视化分析.html"}, {"title": "基层社会治理制度建设精度、温度和尺度", "authors": "赵晓峰", "year": "2023", "language": "CN", "affiliation": "赵晓峰，男，西北农林科技大学人文社会发展学院教授、博士生导师", "journal": "求索 2023 年第1 期感、幸福感、安全感。建设共建共治共享的社会治理制度，是在中国式现代化进程中完善社会治理体系的重要内容，也是加强国家政权建设的客观需要。发展国家基础权力的核心是强化现代国家的制度能力，通过制度能力建设使国家权力向基层", "abstract": "在推进中国式现代化进程中，建设共建共治共享的社会治理制度是完善社会治 党的十八届三中全会从改进社会治理方式、激发社会组织活力等方面，全方位部署了社会治理 新时代的背景下，社会治理体系的建设与治理能力的完善是促进国家平稳发展的重要制度保障", "link": "content/CN/赵晓峰 - 2023 - 基层社会治理制度建设精度、温度和尺度.html"}, {"title": "乡土性与国家化：新乡土德治的理论来源、现实困境与实践路径探究", "authors": "邓谨和马千里", "year": "2024", "language": "CN", "affiliation": "邓谨，女，西北农林科技大学马克思主义学院教授，主要研究方向为农村基层党建与乡村治理。＊通信作者", "journal": "Journal of Northwest A", "abstract": "乡村文明是中华文明史的主体，而乡土德治缔造了农耕文明的基因。新乡土德治是乡土性与国家化相结合产生的乡村德治新形态，其理论生成来源于“根脉”与“魂脉”的统一，是乡村德治重释文明与重塑认同的产物。新乡土德治的核心问题是要处理好乡土性与国家化的关系，让传统道德赓续民族血脉，传承文明基因，体现乡村德治的民族特色、民族气派和民族风格；让国家化成风化俗，正心明道，赋予传统道德以现代性力量。在乡土社会的现代性变迁中，新乡土德治面临德治价值之困，德治规范之散，德治权威之尴等系列现实困境，冲击着乡村德治的价值、结构与秩序。基于“以何治－如何治－谁来治”的逻辑，从基因传承、制度支撑和结构化权威方面探究了新乡土德治的实践路径，实质是“历史－文化－政治”维度的价值共生，是传统与现代德治元素的共契共治。只有如此，新乡土德治才能实现为乡村振兴培“根”铸“魂”的治理目标", "link": "content/CN/邓谨和马千里 - 2024 - 乡土性与国家化：新乡土德治的理论来源、现实困境与实践路径探究.html"}, {"title": "村规民约的文本和背后的治理议题及演变——以浙江省衢州市上洋村十版“村规民约”为例", "authors": "郎友兴 等", "year": "2022", "language": "CN", "affiliation": "郎友兴，浙江大学公共管理学院教授、博士生导师；陈文文，浙江大学社会学系博士研究生；薛晓婧，浙江工", "journal": "看，一方面这是政府所强调的。现代村规民约从内容、行文到印制，实际上都是由当地政府尤其民政部门统一组织或推动，这一官方性反映了政府部门对村民自治的目标设计和政策追求①。在地方实践中，有些村委按照基层政府下发的“范本”，不断重新修订相关规约，村", "abstract": "村规民约文本内含着村庄治理的基本内容，前后不同的版本忠实地记载着治理变迁 的历史信息。对衢州市上洋村十版村规民约进行文本分析来追寻三十年来乡村治理变化的轨限制村域内权威为导向，其背后治理议题逐渐地从整合控制论、义务论、整体利益论、村落身份认同论走向权利论、主体论和平权论，从工具论走向工具与权利、价值融合的治理轨道上。这些印迹与村治演变过程恰恰是中国多数村庄所经历着的，从这个意义上来说，上洋村并非是独一无二的，借其可以窥见乡村社会之普遍表现形态", "link": "content/CN/郎友兴 等 - 2022 - 村规民约的文本和背后的治理议题及演变——以浙江省衢州市上洋村十版“村规民约”为例.html"}, {"title": "民族地区村规民约在乡村治理中的作用现状与优化路径——以广西河池市巴马瑶族自治县为例", "authors": "郭剑平 等", "year": "2022", "language": "CN", "affiliation": "未自动识别", "journal": "未自动识别", "abstract": "党的十九大报告中提出健全自治、法治、德治相结合的乡村治理体   一步发挥村规民约在乡村治理中的作用。  民族地区村规民约是由少数民族地区村民通过村民会议并结合本村实际共同商议讨论  ", "link": "content/CN/郭剑平 等 - 2022 - 民族地区村规民约在乡村治理中的作用现状与优化路径——以广西河池市巴马瑶族自治县为例.html"}, {"title": "以数字化促进乡村民主治理", "authors": "金龙君和翟翌", "year": "2022", "language": "CN", "affiliation": "〕金龙君（1994-），男，贵州遵义人，重庆大学法学院博士生，重庆大学法学院政府规制与公共政策法治研究所", "journal": "《理论探索》2022年第4期（总第256期）公共行政以数字化促进乡村民主治理金龙君翟翌（重庆大学，重庆 400044）治理成本、兼顾村民个体参与和乡村发展的需要。从数字化对乡村民主治理的促进机理来讲，按照制度、价值、物质、行动和过程五大层面", "abstract": "〕乡村民主治理需要以数字化来促进，这主要是因为数字化可避免乡村民主治理的泛化、降低 治理的实践与规范场域都具备数字化空间。从当前云计算、大数据、人工智能、物联网等数字化技术的发展势头来看，在未来的乡村治理中，数字化必将继续深入改进乡村治理手段与方式，并成为乡村治理中至关重要的组成部分。因此，本文试图明确数字化对乡村民主治理的促进作用，以回应乡村发展民主的现实需要。一、乡村民主治理需要数字化的促进数字化指诸如人工智能、大数据、云计算等各种新兴信息技术在社会发展中的应用〔1〕。随着乡村地区网络基础设施建设不断完善，数字信息体系逐渐形成，数字化在乡村治理中发挥着更为重要的视阈下我国高校教师聘用制改革研究”（2021CDJSKJC32），中央高校基本科研业务费项目“人类命运共同体视野下我国宪法与国际法交融的理论与实践研究”（2022CDJSKZX02），重庆市社会科学规划项目“‘人类命运共翟翌（1983-），男，广西河池人，重庆大学法学院教授、博士生导师，重庆大学法学院政府规制与公共政策法治研究所所长，国家智库重庆大学国家网络空间安全与大数据法治战略研究院副院长，主要研究方向为宪法 〔", "link": "content/CN/金龙君和翟翌 - 2022 - 以数字化促进乡村民主治理.html"}, {"title": "我国城市社区居民公约何以有效？——基于制度层级的分析", "authors": "陈伟东和张彩云", "year": "2023", "language": "CN", "affiliation": "陈伟东（1964—），男，华中师范大学政治与国际关系学院教授、博士生导师，湖北城市社区建设研究中", "journal": "北京行政学院学报", "abstract": "居民公约何以有效是基层治理的重要议题。基于国家与社会关系视角，遵循结构—功能分析路径，搭建制度层级分析框架，将居民公约视为由法律政策层、管理规范层、行动操作层三个制度层级相互作用所构成的规则体系。在该框架指导下，剖析河南省X 市Y 社区个案发现：居民公约制度层级体系因行动操作层断裂出现行政导向挤压公约自主性空间、参与缺乏引发公约认同感不足、内容宽泛造成公约操作性有限、监督缺位导致公约约束力式微等困境，致使公约悬浮失效。居民公约制度层级耦合能够充分发挥公约功能，提升公约建构自主性、公约主体共识性、公约内容合理性和公约实施可行性，有效激励和约束居民，促使居民公约落地有效。研究发现，居民公约有效的生成逻辑在于建构了激发居民主动性和潜能的制度层级关系，即通过制度层级主体联结、制度层级权力彰显、制度层级领域拓展，实现公约主体角色重塑、公约权力优化配置、公约资源开发整合", "link": "content/CN/陈伟东和张彩云 - 2023 - 我国城市社区居民公约何以有效？——基于制度层级的分析.html"}, {"title": "基层自治规范审查的多维基准与制度展开", "authors": "陈北冬", "year": "2026", "language": "CN", "affiliation": "陈北冬（1987—），男，辽宁本溪人，法学博士，河南财经政法大学法学院讲师、地方立法研究中心研究人员", "journal": "学习论坛", "abstract": "基层自治规范审查对于推进基层治理法治化意义重大，但相关制度建构还存在诸多不 足。根据《村组法》第二十七条和《居组法》第十五条，基层自治规范的审查涵盖合宪性、合法性、政策性三个维度。三者既相互独立又紧密关联，审查基准的设计应充分反映这种复杂性。为满足不同维度审查的差异化需求，还有必要建立一个由行政审查、司法审查、人大审查、自主审查共同构成的复合审查体制，并明确各审查主体在其中的角色定位和参与模式。与之相匹配，基层自治规范的审查后处置、审查争议解决、审查适用协调等配套机制亦需得到进一步完善，以确保相关审查工作的合理、有效开展 仅是“健全党组织领导的自治、法治、德治相结合的城乡基层治理体系”的内在要求，而且是“推动乡村全面振兴”“推进新型城镇化”“健全基层民主制度”等政策目标顺利实现的坚实保障。然而，截至目前，相关工作尚未形成成熟范式。2018年，民政部等七部门联合发布的《关于做好村规民约和居民公约工作的指导意见》（以下简称《意见》）曾明确要求，基层自治规范制定工作需“坚持合法合规，不得违背宪法和法律精神，不得侵犯国家、集体利益和群众合法权益”。该规定重申了《村组法》第二十七条与《居组法》第十五条的相关法治要求，但并未提供进一步细化指引。自《意见》发布以来，地方实践仍面临诸多困惑：基层自治规范审查是否需从合宪性、合法性及政策性三个维度分别展开？各维度审查应如何具体实施？这些问题仍需地方层面深入探索。与此同时，既往理论研究能够为此提供的指导亦相对有", "link": "content/CN/陈北冬 - 2026 - 基层自治规范审查的多维基准与制度展开.html"}, {"title": "教育作为一种治理技术——基于华北农村社区治理过程的考察", "authors": "陈学金", "year": "2021", "language": "CN", "affiliation": "陈学金，北京市社会科学院社会学研究所副研究员，主要研究方向为城乡人类学、教育人", "journal": "http://src.ruc.edu.cn 社会学评论 2021年第6期教育作为一种治理技术——基于华北农村社区治理过程的考察陈学金内容提要：基层干部在国家与村民之间扮演着中介角色，本文尝试从基层干部有关治理实践的表述来分析农村社区治理策略", "abstract": "未自动识别", "link": "content/CN/陈学金 - 2021 - 教育作为一种治理技术——基于华北农村社区治理过程的考察.html"}, {"title": "我国乡村治理多元规范及其功能研究", "authors": "陈潮辉", "year": "2024", "language": "CN", "affiliation": "陈潮辉( 1970—)，男，广东潮州人，法学博士，湖南科技学院文法学院教师，湖南勤人坡律师事务所律师", "journal": "Journal of Xiangtan University", "abstract": "在建设中国特色社会主义法治的语境下，乡村治理现代化要求正式规范的国家法、政策与非正式规范的村民自治章程、村规民约的协调共治。国家法在乡村治理中具有秩序建构、规范性预期和权益保护的功能，政策在乡村治理中具有微观填补和宏观规划的功能，村民自治章程在乡村治理中具有促进村民自治和约束行政权的功 正式规范和非正式规范在乡村治理中各自展现其功能优势，共同促进乡村治理现代化", "link": "content/CN/陈潮辉 - 2024 - 我国乡村治理多元规范及其功能研究.html"}, {"title": "乡村建设行动中的资源输入与村庄公共政治再造", "authors": "陈锋", "year": "2022", "language": "CN", "affiliation": "陈锋,男,博士,北京工业大学文法学部、北京社会管理研究基地教授,博士生导师", "journal": "期吉首大学学报(社会科学版)", "abstract": "乡村建设行动中大量的资金资源输入为重新塑造村庄公共政治提供了契机。在实践中,大量的资金资源输入,尤其是村庄自主使用公益资金的输入,结合村民议事会、监事会等组织设置和相关议事监事制度的配套,能充分表达村民公共品供给的需求,体现出村庄的主体性,并激活村民自治。同时,以资源输入为契机所建立的村规民约,明确了村民的权利与义务,具有对村民利益连带的强制力,从而也能有效克服公共品供给中法治剩余事务之外的农民不合作困境。以公共品需求表达为核心的分配型协商民主提高了村民参与民主协商的积极性,以利益规制为基础的村规民约实践则有效形塑了权利与义务相均衡的公民意识和乡村 [1]113,有学者也将其称之为“项目 行公共品的供给治国”[2]。在乡村建设中,资源输入一定程度上改善了农村的公共品供给状况,避免了税费改革初期出现的基层政权“悬浮”[3]的状况,越来越多地通过项目制来调动基层政府积极性,并以项目中 [4],国家、基层组织与心模式进行行政资源的分配农民关系得以重新塑造。但相关研究显示,项目制这种“制度内的自上而下的”决策方式,具有较强的“技术理性”特征,在向下“委托”项目时,项目管理技术能够较好地解决项目“监督”问题,但在项目进村中却遭遇“最后一公里”的困境 [5]。具体而言,资源输入遭遇“最后一公里”的困境表现为两个层面:一是项目输入与农民公共品供给需求", "link": "content/CN/陈锋 - 2022 - 乡村建设行动中的资源输入与村庄公共政治再造.html"}, {"title": "国家力量的双重进入与村规民约的重塑——基于215份优秀村规民约的文本分析", "authors": "陈锋和徐悦鑫", "year": "2024", "language": "CN", "affiliation": "未自动识别", "journal": "学习与实践2024年第3期国家力量的双重进入与村规民约的重塑——基于215份优秀村规民约的文本分析陈锋徐悦鑫家力量与地方非正式规范的遭遇中，嵌入地方知识的同时将其纳入到国家的规则体系之下规范化地运行。当代村规民约在承担更多的国家政策的转译与", "abstract": "国家权力主要通过国家的“村规民约化”和村规民约的“国家化”两种方式进入到乡土社会中。国", "link": "content/CN/陈锋和徐悦鑫 - 2024 - 国家力量的双重进入与村规民约的重塑——基于215份优秀村规民约的文本分析.html"}, {"title": "嵌入与连带：村规民约何以有效融入乡村提升治理效能——以W市J区3个典型村庄为例", "authors": "马致远和张大维", "year": "2024", "language": "CN", "affiliation": "马致远, 男, 华中师范大学中国农村研究院、政治科学高等研究院博士研究生, 主", "journal": "华中科技大学学报", "abstract": "未自动识别", "link": "content/CN/马致远和张大维 - 2024 - 嵌入与连带：村规民约何以有效融入乡村提升治理效能——以W市J区3个典型村庄为例.html"}, {"title": "规则主导与制度耦合：自治、法治与德治的辩证关系分析", "authors": "鲁旭和池建华", "year": "2023", "language": "CN", "affiliation": "鲁旭，华东师范大学社会发展学院博士研究生（上海，200241）；池建华，南京农业大学人文与社会发展学院副教", "journal": "南京大学学报（哲学•人文科学•社会科学）", "abstract": "从村民自治到自治、法治、德治相结合的转变，不仅仅是乡村治理体制形式上的变化，还是我国统筹推进国家治理、社会治理、基层治理的新举措。理解自治、法治、德治相结合，首选要分析和认识自治、法治、德治三者之间的关系，从整体上把握三者之间的内在逻辑。作为治理的一种方式，自治、法治、德治都需要以规则为根据，由此在乡村治理实践中形成制度耦合关系。健全自治、法治、德治相结合的乡村治理体系，要求我们必须坚持村民自治的基础地位不变，同时强化法治的保 法律人类学新中国成立以来，我们党领导人民不断探索实践，逐步形成了中国特色社会主义国家关于自治、法治与德治之间的关系，2018 年中央一号文件中的表述是“自治为基”、“法 2023 年第15卷第1期规则主导与制度耦合：自治、法治与德治的辩证关系分析制度和法律制度，为当代中国发展进步提供了根本制度保障。在中国特色社会主义国家制度体系中，基层群众自治制度是重要的基本政治制度，是发展社会主义基层民主、促进基层社会和谐稳定的重要制度保障。改革开放40多年来，我国不断探索并形成了一条符合中国国情、以乡村善治为目标的中国特色乡村治理道路，其标志是党的十九大报告提出“自治法治为本”，关于“德治”并无类似表述；《乡村振兴战略规划（2018-2022）》中的表述是“自治为基、法治为本、德治为先”，三者之间应当是“有机结合”。郁建兴、任杰认为：“基层社会治理中自治、法治与德治是可以结合而且必须结合的。自治是法治与德治的基础，法治是自治与德治的边界和保障，德治是较高追求，德治以自治与法治为基石，并对自治与法治形成有力补充。”①邓大才认为：“自治、法治、德治是三种不同的治理方式，三者有不同的功能和", "link": "content/CN/鲁旭和池建华 - 2023 - 规则主导与制度耦合：自治、法治与德治的辩证关系分析.html"}, {"title": "乡村法治建设中硬法与软法的冲突及其调适", "authors": "鲁涛和陈红梅", "year": "2024", "language": "CN", "affiliation": "参见[日] 千叶正士:《法律多元———从日本法律文化迈向一般理论》, 强世功等译, 中国政法大学出版社1997 年版, 第1-11 页", "journal": "习近平:《决胜全面建成小康社会夺取新时代中国特色社会主义伟大胜利》, 载《人民日报》2017 年10 月28 日, 第1 版 参见高其才、张华:《乡村法治建设的两元进路及其融合》, 载《清华法学》2022 年第6 期", "abstract": "基于法律多元的视角, 乡村法治建设中的法治规范包括硬法和软法。两种法治规范在不同的作用场域构筑起精细的“规则网络”, 共同为乡村法治建设提供助益。目前基于生成理念的差异、调适机制的欠缺以及经济利益的刺激等原因, 硬法与软法在乡村法治建设中尚存在诸多矛盾冲突。鉴于此, 可从价值观念、制度机制、资源要素等多个维度入手, 通过强化乡风文明建设、优化村规民约备案审查机制、合理运用调解资源等方式, 调适硬法与软法之间的矛盾冲突, 促使形成乡村法治建设合力", "link": "content/CN/鲁涛和陈红梅 - 2024 - 乡村法治建设中硬法与软法的冲突及其调适.html"}, {"title": "民事裁判中村规民约适用问题研究——基于314份裁判文书的实证分析", "authors": "黄思宇", "year": "2024", "language": "CN", "affiliation": "陈玮铧:《论农村集体经济组织成员资格认定的性质及纠纷解决路径》, 载《东南大学学报(哲学社会科学版)》2023 年第S2 期", "journal": "东南大学学报(哲学社会科学版)", "abstract": "村规民约在民事司法案件裁判中的适用, 可以直接反映出村规民约在民间纠纷解决中的作用和功能。民事案件司法裁判中, 村规民约究竟能不能适用、如何适用, 一直是法学界的难题。实证分析发现, 涉村规民约的司法裁判存在裁判标准不统一、法律适用不一致、法律依据不充分等诸多问题。必须通过加强该类案件裁判文书中裁判理由的释明说理及法官自由裁量权行使标准的统一性, 强化法院对村规民约的司法审查权, 以提高人民法院审理该类案件的司法裁判结果的权威性和社会可接受性。可以通过“规范认定与实践认知”的循环往复, 进一步解决和完善民事案件司法裁判中村规民约的适用所出现的法律问题", "link": "content/CN/黄思宇 - 2024 - 民事裁判中村规民约适用问题研究——基于314份裁判文书的实证分析.html"}]</script>
  <script>
    (function () {
      "use strict";

      const paperDataEl = document.getElementById("paperData");
      const langFiltersEl = document.getElementById("langFilters");
      const yearFiltersEl = document.getElementById("yearFilters");
      const searchInput = document.getElementById("searchInput");
      const paperGrid = document.getElementById("paperGrid");
      const emptyStateTemplate = document.getElementById("emptyStateTemplate");
      const statTotal = document.getElementById("statTotal");
      const statVisible = document.getElementById("statVisible");

      if (!paperDataEl || !langFiltersEl || !yearFiltersEl || !searchInput || !paperGrid || !statTotal || !statVisible) {
        return;
      }

      let papers = [];
      try {
        papers = JSON.parse(paperDataEl.textContent || "[]");
      } catch (error) {
        paperGrid.innerHTML = "<section class=\"empty-state\"><h2>数据加载失败</h2><p>请检查 paper-data.json 与 index 页面数据是否完整。</p></section>";
        return;
      }

      papers.sort((a, b) => {
        const yearDiff = String(b.year || "").localeCompare(String(a.year || ""));
        if (yearDiff !== 0) {
          return yearDiff;
        }
        return String(a.title || "").localeCompare(String(b.title || ""), "zh-CN");
      });

      const yearSet = Array.from(new Set(papers.map((paper) => String(paper.year || "")).filter(Boolean)));
      yearSet.sort((a, b) => b.localeCompare(a));

      let activeLang = "all";
      let activeYear = "all";

      function resolveLanguage(paper) {
        const raw = String(paper.language || paper.category || "").toUpperCase();
        if (raw === "CN" || raw === "EN") {
          return raw;
        }
        const link = String(paper.link || "");
        if (link.includes("/EN/")) {
          return "EN";
        }
        if (link.includes("/CN/")) {
          return "CN";
        }
        const mixedText = [paper.title, paper.abstract].map((item) => String(item || "")).join(" ");
        return /[\u4e00-\u9fff]/.test(mixedText) ? "CN" : "EN";
      }

      function clipText(text, maxLen) {
        const raw = String(text || "").trim() || "未自动识别";
        if (raw.length <= maxLen) {
          return raw;
        }
        return raw.slice(0, maxLen).trimEnd() + "…";
      }

      function makeMetaRow(label, value) {
        const row = document.createElement("p");
        row.className = "meta-row";

        const strong = document.createElement("strong");
        strong.textContent = label + "：";
        row.appendChild(strong);

        row.append(" " + clipText(value, 180));
        return row;
      }

      function createCard(paper) {
        const article = document.createElement("article");
        article.className = "paper-card";

        const top = document.createElement("div");
        top.className = "card-top";

        const badgeType = document.createElement("span");
        badgeType.className = "card-badge";
        badgeType.textContent = resolveLanguage(paper) === "EN" ? "English" : "中文文献";

        const badgeYear = document.createElement("span");
        badgeYear.className = "card-badge";
        badgeYear.textContent = paper.year || "年份未知";

        top.appendChild(badgeType);
        top.appendChild(badgeYear);

        const heading = document.createElement("h2");
        const titleLink = document.createElement("a");
        titleLink.href = encodeURI(String(paper.link || "#"));
        titleLink.textContent = paper.title || "未自动识别";
        heading.appendChild(titleLink);

        const authorRow = makeMetaRow("作者", paper.authors);
        const affRow = makeMetaRow("作者单位", paper.affiliation);
        const journalRow = makeMetaRow("期刊名称", paper.journal);

        const details = document.createElement("details");
        details.className = "abstract-preview";

        const summary = document.createElement("summary");
        summary.textContent = "摘要";

        const abstractText = document.createElement("p");
        abstractText.textContent = clipText(paper.abstract, 360);

        details.appendChild(summary);
        details.appendChild(abstractText);

        const readLink = document.createElement("a");
        readLink.className = "read-link";
        readLink.href = encodeURI(String(paper.link || "#"));
        readLink.textContent = "进入 HTML 阅读";

        article.appendChild(top);
        article.appendChild(heading);
        article.appendChild(authorRow);
        article.appendChild(affRow);
        article.appendChild(journalRow);
        article.appendChild(details);
        article.appendChild(readLink);

        return article;
      }

      function buildLanguageFilters() {
        const options = [
          { key: "all", label: "全部" },
          { key: "CN", label: "中文" },
          { key: "EN", label: "English" },
        ];
        options.forEach((option, idx) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = idx === 0 ? "filter-btn active" : "filter-btn";
          button.textContent = option.label;
          button.dataset.lang = option.key;
          langFiltersEl.appendChild(button);
        });

        langFiltersEl.querySelectorAll(".filter-btn").forEach((button) => {
          button.addEventListener("click", () => {
            langFiltersEl.querySelectorAll(".filter-btn").forEach((node) => node.classList.remove("active"));
            button.classList.add("active");
            activeLang = button.dataset.lang || "all";
            render();
          });
        });
      }

      function buildYearFilters() {
        const allButton = document.createElement("button");
        allButton.type = "button";
        allButton.className = "filter-btn active";
        allButton.textContent = "全部年份";
        allButton.dataset.filter = "all";
        yearFiltersEl.appendChild(allButton);

        yearSet.forEach((year) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "filter-btn";
          button.textContent = year;
          button.dataset.filter = year;
          yearFiltersEl.appendChild(button);
        });

        yearFiltersEl.querySelectorAll(".filter-btn").forEach((button) => {
          button.addEventListener("click", () => {
            yearFiltersEl.querySelectorAll(".filter-btn").forEach((node) => node.classList.remove("active"));
            button.classList.add("active");
            activeYear = button.dataset.filter || "all";
            render();
          });
        });
      }

      function filterPapers() {
        const keyword = String(searchInput.value || "").trim().toLowerCase();
        return papers.filter((paper) => {
          const langOk = activeLang === "all" || resolveLanguage(paper) === activeLang;
          if (!langOk) {
            return false;
          }
          const yearOk = activeYear === "all" || String(paper.year || "") === activeYear;
          if (!yearOk) {
            return false;
          }
          if (!keyword) {
            return true;
          }
          const searchText = [paper.title, paper.authors, paper.affiliation, paper.journal, paper.abstract, paper.year]
            .map((value) => String(value || ""))
            .join(" ")
            .toLowerCase();
          return searchText.includes(keyword);
        });
      }

      function render() {
        const visiblePapers = filterPapers();
        paperGrid.textContent = "";

        visiblePapers.forEach((paper) => {
          paperGrid.appendChild(createCard(paper));
        });

        if (visiblePapers.length === 0 && emptyStateTemplate && "content" in emptyStateTemplate) {
          paperGrid.appendChild(emptyStateTemplate.content.cloneNode(true));
        }

        statTotal.textContent = String(papers.length);
        statVisible.textContent = String(visiblePapers.length);
      }

      buildLanguageFilters();
      buildYearFilters();
      searchInput.addEventListener("input", render);
      render();
    })();
  </script>
</body>
</html>
